name: CI/CD Pipeline - Examen Transversal INY1105

# Se activa de forma automática cada vez que se hace un commit/push en main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Despliegue Continuo en AWS EC2
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el código en el entorno temporal de GitHub
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    # 2. Conectarse de forma segura a tu máquina AWS por SSH para actualizarla
    - name: Despliegue automatizado vía SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          echo "🌐 Conexión exitosa a AWS. Iniciando despliegue automatizado..."
          
          # Entrar al directorio del proyecto en tu máquina AWS
          cd ~/examen-infra

          echo "🛑 Deteniendo contenedores antiguos para evitar conflictos de puertos..."
          docker stop mynginx myapp 2>/dev/null || true
          docker rm mynginx myapp 2>/dev/null || true

          echo "🔨 [IE 3.2.1] Reconstruyendo imagen de la Aplicación Web..."
          cd ~/examen-infra/myapp
          docker build -t myapp_image:latest .

          echo "🔨 [IE 3.2.2] Reconstruyendo imagen del Proxy Inverso NGINX..."
          cd ~/examen-infra/mynginx
          docker build -t mynginx_image:latest .

          echo "🌐 [IE 2.4.1] Verificando red interna aislada..."
          docker network inspect iny1105_network >/dev/null 2>&1 || docker network create iny1105_network

          echo "🚀 [IE 3.3.1] Levantando aplicación con persistencia Bind Mount..."
          docker run -d \
            --name myapp \
            --network iny1105_network \
            -v /home/ubuntu/examen-infra/data:/usr/src/app/data \
            myapp_image:latest

          echo "🚀 Levantando NGINX exponiendo el puerto público 80..."
          docker run -d \
            --name mynginx \
            --network iny1105_network \
            -p 80:80 \
            mynginx_image:latest

          echo "✅ ¡Despliegue automatizado completado con éxito!"
